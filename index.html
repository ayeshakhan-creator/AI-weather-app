<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Weather Predictor 🌦️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>🌤️ <b>AI Weather Predictor</b></h2>
    <p>Enter your city name & get temperature + smart AI advice!</p>

    <div class="input-group">
      <input type="text" id="city" placeholder="Enter city name">
      <button onclick="getWeather()">Check Weather</button>
    </div>

    <p id="weather"></p>
    <p id="aiSuggestion"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
